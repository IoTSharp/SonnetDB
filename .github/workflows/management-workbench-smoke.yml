name: Management workbench smoke

on:
  pull_request:
    paths:
      - 'web/**'
      - 'extensions/sonnetdb-vscode/**'
      - 'src/SonnetDB/Contracts/Dtos.cs'
      - 'src/SonnetDB/Endpoints/Routes/ManagementContractEndpoints.cs'
      - 'src/SonnetDB/Json/ServerJsonContext.cs'
      - 'src/SonnetDB.LanguageServer/**'
      - 'tests/SonnetDB.LanguageServer.Tests/**'
      - 'tests/SonnetDB.Tests/ManagementContractEndpointTests.cs'
      - 'src/SonnetDB.Studio/**'
      - 'docs/management-tools.md'
      - '.github/workflows/management-workbench-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'extensions/sonnetdb-vscode/**'
      - 'src/SonnetDB/Contracts/Dtos.cs'
      - 'src/SonnetDB/Endpoints/Routes/ManagementContractEndpoints.cs'
      - 'src/SonnetDB/Json/ServerJsonContext.cs'
      - 'src/SonnetDB.LanguageServer/**'
      - 'tests/SonnetDB.LanguageServer.Tests/**'
      - 'tests/SonnetDB.Tests/ManagementContractEndpointTests.cs'
      - 'src/SonnetDB.Studio/**'
      - 'docs/management-tools.md'
      - '.github/workflows/management-workbench-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server-contracts:
    name: Server management contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test multi-model management contracts
        run: >-
          dotnet test tests/SonnetDB.Tests/SonnetDB.Tests.csproj
          --configuration Release
          --artifacts-path artifacts/management-contracts
          --filter FullyQualifiedName~ManagementContractEndpointTests
          --results-directory artifacts/test-results/management-contracts
          --logger "trx;LogFileName=management-contracts.trx"

      - name: Upload contract test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: management-contract-results
          path: artifacts/test-results/management-contracts
          if-no-files-found: ignore

  web-admin:
    name: Web Admin and Studio bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Web Admin dependencies
        working-directory: web
        run: npm ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Build Web Admin
        working-directory: web
        run: npm run build

      - name: Run management workbench smoke
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: management-workbench-playwright
          path: artifacts/playwright
          if-no-files-found: ignore

  studio-host:
    name: Studio desktop host
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build Studio host
        run: >-
          dotnet build src/SonnetDB.Studio/SonnetDB.Studio.csproj
          --configuration Release
          --artifacts-path artifacts/studio-host

  vscode-consumer:
    name: VS Code HTTP consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: extensions/sonnetdb-vscode/package-lock.json

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test SQL language server
        run: dotnet test tests/SonnetDB.LanguageServer.Tests/SonnetDB.LanguageServer.Tests.csproj

      - name: Install extension dependencies
        working-directory: extensions/sonnetdb-vscode
        run: npm ci

      - name: Run extension consumer smoke
        working-directory: extensions/sonnetdb-vscode
        run: npm test

      - name: Package VS Code extension
        working-directory: extensions/sonnetdb-vscode
        run: npm run package:vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: sonnetdb-vscode-vsix
          path: extensions/sonnetdb-vscode/dist/sonnetdb-vscode.vsix

  vscode-extension-host:
    name: VS Code Extension Host
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: extensions/sonnetdb-vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: extensions/sonnetdb-vscode
        run: npm ci

      - name: Run Extension Host smoke
        working-directory: extensions/sonnetdb-vscode
        run: npm run test:host
