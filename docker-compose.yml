services:
  sonnetdb:
    image: iotsharp/sonnetdb
    ports:
      - "5080:5080"
      - "5081:5081"
      - "1883:1883"
    volumes:
      - sonnetdb-data:/data
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${SONNETDB_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SONNETDB_SonnetDBServer__Observability__Prometheus__Enabled: ${SONNETDB_PROMETHEUS_ENABLED:-false}
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.1
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.2
    profiles: ["observability"]
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  sonnetdb-data:
  prometheus-data:
  grafana-data:
